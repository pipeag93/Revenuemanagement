<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Omni Revenue — Iniciar Sesión</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#0c0e14;color:#ede8dc;font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
  .card{background:#13161f;border:1px solid rgba(212,168,67,0.15);border-radius:12px;padding:40px;width:100%;max-width:400px;}
  .brand{text-align:center;margin-bottom:32px;}
  .brand-mark{width:48px;height:48px;border:2px solid #d4a843;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;color:#d4a843;font-size:18px;font-weight:700;margin:0 auto 12px;}
  .brand-name{font-family:'Playfair Display',serif;font-size:22px;font-weight:600;color:#ede8dc;}
  .brand-sub{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:2px;color:#8a6820;margin-top:2px;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:#7a7e8a;margin-bottom:6px;}
  .field input{width:100%;background:#1f2333;border:1px solid rgba(255,255,255,0.07);border-radius:6px;padding:11px 14px;color:#ede8dc;font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:border-color .15s;}
  .field input:focus{border-color:#d4a843;background:rgba(212,168,67,0.05);}
  .btn{width:100%;background:#d4a843;color:#0c0e14;border:none;border-radius:8px;padding:12px;font-size:13px;font-weight:700;cursor:pointer;margin-top:8px;font-family:'Inter',sans-serif;letter-spacing:.3px;transition:background .15s;}
  .btn:hover{background:#f0cc7a;}
  .msg{padding:10px 14px;border-radius:6px;font-size:12px;margin-bottom:16px;}
  .msg.error{background:rgba(224,92,92,0.1);border:1px solid rgba(224,92,92,0.3);color:#e07070;}
  .msg.success{background:rgba(76,175,120,0.1);border:1px solid rgba(76,175,120,0.3);color:#4caf78;}
  .footer{text-align:center;margin-top:20px;font-size:12px;color:#3a3e4a;}
  .footer a{color:#d4a843;text-decoration:none;}
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <div class="brand-mark">OR</div>
    <div class="brand-name">Omni Revenue</div>
    <div class="brand-sub">Revenue Intelligence Platform</div>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
  {% for cat, msg in messages %}
  <div class="msg {{ cat }}">{{ msg }}</div>
  {% endfor %}
  {% endwith %}

  <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="field">
      <label>Email</label>
      <input type="email" name="email" required placeholder="tu@email.com" autofocus>
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" name="password" required placeholder="••••••••">
    </div>
    <button type="submit" class="btn">Iniciar Sesión</button>
  </form>

  <div class="footer">
    ¿No tienes cuenta? <a href="{{ url_for('auth.register') }}">Regístrate</a>
  </div>
</div>
</body>
</html>
